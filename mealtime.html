          activeRecipe.directions.splice(parseInt(btn.dataset.idx), 1);
          renderDirections();
        });
      });

      document.getElementById('addDirBtn')?.addEventListener('click', () => {
        syncEdits();
        activeRecipe.directions.push('');
        renderDirections();
        const textareas = dirEl.querySelectorAll('.edit-dir-text');
        textareas[textareas.length - 1]?.focus();
      });

      // Delete recipe button
      const delWrap = document.createElement('div');
      delWrap.className = 'edit-delete-wrap';
      delWrap.innerHTML = `<button class="edit-delete-recipe-btn" id="deleteRecipeEditBtn">Delete Recipe</button>`;
      dirEl.appendChild(delWrap);

      document.getElementById('deleteRecipeEditBtn')?.addEventListener('click', () => {
        const idx = RECIPES.indexOf(activeRecipe);
        closeRecipe();
        if (idx !== -1) deleteRecipe(idx);
      });

      return;
    }

    // ── normal (view) mode ──
    activeRecipe.directions.forEach((step, i) => {
      const el = document.createElement('div');
      el.className = 'direction-item';
      el.innerHTML = `<span class="direction-num">${i + 1}</span><span class="direction-text">${step}</span>`;
      dirEl.appendChild(el);
    });
  }

  function addIngredient(i) {
    if (!activeRecipe || addedIngredients.has(i)) return;
    const ing = activeRecipe.ingredients[i];
    const id  = _shopId++;
    SHOPPING.push({ id, name: ing.name, qty: multiplyQty(ing.qty, currentMultiplier), checked: false });
    addedIngredients.set(i, id);
    saveShopping();
    renderList();
    updateDockSub();

    const btn = document.querySelector(`.ingredient-add[data-ing="${i}"]`);
    if (btn) {
      btn.classList.add('added', 'pop');
      btn.closest('.ingredient-item').classList.add('added');
      btn.addEventListener('animationend', () => btn.classList.remove('pop'), { once: true });
    }
    updateFooter();
  }

  function removeIngredient(i) {
    if (!activeRecipe || !addedIngredients.has(i)) return;
    const id  = addedIngredients.get(i);
    const idx = SHOPPING.findIndex(s => s.id === id);
    if (idx !== -1) SHOPPING.splice(idx, 1);
    addedIngredients.delete(i);
    saveShopping();
    renderList();
    updateDockSub();

    const btn = document.querySelector(`.ingredient-add[data-ing="${i}"]`);
    if (btn) {
      btn.classList.remove('added', 'pre-added');
      _preAddedIndices.delete(i);
      const row = btn.closest('.ingredient-item');
      row.classList.remove('added', 'pre-added-row');
    }
    updateFooter();
  }

  function toggleAllIngredients() {
    if (!activeRecipe) return;
    const allAdded = addedIngredients.size === activeRecipe.ingredients.length;
    if (allAdded) {
      [...addedIngredients.keys()].forEach(i => removeIngredient(i));
    } else {
      activeRecipe.ingredients.forEach((_, i) => {
        if (!addedIngredients.has(i)) addIngredient(i);
      });
    }
  }

  function updateFooter() {
    if (!activeRecipe) return;
    const total   = activeRecipe.ingredients.length;
    const added   = addedIngredients.size;
    const pct     = total > 0 ? (added / total) * 100 : 0;
    const allDone = added === total;

    document.getElementById('footerCount').textContent = `${added} of ${total} added`;
    document.getElementById('footerBar').style.width   = pct + '%';

    const footerBtn = document.getElementById('footerAddAllBtn');
    const addAllBtn = document.getElementById('addAllBtn');

    if (allDone) {
      footerBtn.textContent = 'Remove all';
      footerBtn.classList.remove('all-done');
      footerBtn.classList.add('remove-mode');
      footerBtn.disabled = false;
      addAllBtn.textContent = 'Remove all';
      addAllBtn.disabled = false;
    } else {
      footerBtn.textContent = 'Add all';
      footerBtn.classList.remove('all-done', 'remove-mode');
      footerBtn.disabled = false;
      addAllBtn.textContent = 'Add to Shopping List';
      addAllBtn.disabled = false;
    }
  }

  document.getElementById('recipeBack').addEventListener('click', closeRecipe);
  scrim.addEventListener('click', () => {
    if (recipeNewSheet.classList.contains('open')) closeNewRecipe();
    else closeRecipe();
  });
  document.getElementById('addAllBtn').addEventListener('click', toggleAllIngredients);
  document.getElementById('footerAddAllBtn').addEventListener('click', toggleAllIngredients);
  document.getElementById('addToCollectionBtn').addEventListener('click', () => {
    const idx = activeFeaturedIdx;
    if (idx === null) return;
    closeRecipe();
    addFeaturedRecipe(idx);
  });

  document.getElementById('recipeEditBtn').addEventListener('click', () => {
    isEditing ? doneEditing(true) : startEditing();
  });

  // Serving multiplier pills
  document.getElementById('recipeMult').addEventListener('click', (e) => {
    const btn = e.target.closest('.mult-btn');
    if (!btn || !activeRecipe) return;
    currentMultiplier = parseInt(btn.dataset.m);
    document.querySelectorAll('.mult-btn').forEach(b => b.classList.toggle('active', b === btn));
    // Update serves count in hero
    document.getElementById('recipeServesVal').textContent = `Serves ${activeRecipe.serves * currentMultiplier}`;
    // Re-render ingredients with new scale
    renderIngredients();
  });

  // Edit-mode photo change
  document.getElementById('recipePhotoBtn').addEventListener('click', () => {
    const fi = document.getElementById('editPhotoInput');
    fi.value = '';
    fi.click();
  });
  document.getElementById('editPhotoInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file || !activeRecipe) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      _resizeImageDataUrl(ev.target.result, 1200, 900, 0.82, (resized) => {
        activeRecipe.image = resized;
        document.getElementById('recipeHeroBg').style.background =
          `url('${resized}') center/cover no-repeat`;
      });
    };
    reader.readAsDataURL(file);
  });

  // swipe down to close
  let touchStartY = 0;
  recipeSheet.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  recipeSheet.addEventListener('touchmove', (e) => {
    const delta = e.touches[0].clientY - touchStartY;
    if (delta > 80 && document.getElementById('recipeBody').scrollTop === 0) {
      closeRecipe();
    }
  }, { passive: true });
</script>

    <path d="M10 2C5.58 2 2 5.36 2 9.5c0 2.08.86 3.96 2.25 5.33L3.5 18l3.42-1.13A8.1 8.1 0 0 0 10 17c4.42 0 8-3.36 8-7.5S14.42 2 10 2Z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
  </svg>
</button>

<!-- Chat panel -->
<div class="mc-panel" id="mcPanel">
  <div class="mc-header">
    <div class="mc-header-left">
      <div class="mc-avatar">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M10 2C5.58 2 2 5.36 2 9.5c0 2.08.86 3.96 2.25 5.33L3.5 18l3.42-1.13A8.1 8.1 0 0 0 10 17c4.42 0 8-3.36 8-7.5S14.42 2 10 2Z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/></svg>
      </div>
      <div>
        <div class="mc-title">Claude</div>
        <div class="mc-sub">Cooking assistant</div>
      </div>
    </div>
    <button class="mc-clear-btn" id="mcClearBtn">Clear</button>
  </div>
  <div id="mcBody"></div>
</div>

<script>
(function() {
  const LS_KEY = 'mealtime_claude_key';
  const btn    = document.getElementById('mcBtn');
  const panel  = document.getElementById('mcPanel');
  const body   = document.getElementById('mcBody');

  let isOpen    = false;
  let isLoading = false;
  let messages  = []; // { role, content }

  /* ── Toggle panel ───────────────────────── */
  btn.addEventListener('click', () => {
    isOpen = !isOpen;
    btn.classList.toggle('open', isOpen);
    panel.classList.toggle('open', isOpen);
    if (isOpen) renderBody();
  });

  document.getElementById('mcClearBtn').addEventListener('click', () => {
    messages = [];
    renderBody();
  });

  /* ── Render ─────────────────────────────── */
  function renderBody() {
    const hasKey = !!localStorage.getItem(LS_KEY);
    if (!hasKey) { renderSetup(); return; }
    renderChat();
  }

  function renderSetup() {
    body.innerHTML = `
      <div class="mc-setup">
        <div class="mc-setup-icon">🔑</div>
        <div class="mc-setup-title">Connect Claude</div>
        <div class="mc-setup-desc">Enter your Anthropic API key to ask questions about recipes, substitutions, techniques, and more.</div>
        <input class="mc-key-input" id="mcKeyInput" type="password" placeholder="sk-ant-api03-…" autocomplete="off" />
        <button class="mc-save-btn" id="mcSaveBtn">Connect</button>
        <div class="mc-key-note">Your key is stored locally only, never sent anywhere except Anthropic.<br><a href="https://console.anthropic.com/settings/keys" target="_blank">Get an API key →</a></div>
      </div>`;

    document.getElementById('mcSaveBtn').addEventListener('click', () => {
      const val = document.getElementById('mcKeyInput').value.trim();
      if (!val.startsWith('sk-')) { document.getElementById('mcKeyInput').style.borderColor = '#FF3B30'; return; }
      localStorage.setItem(LS_KEY, val);
      renderChat();
    });
    document.getElementById('mcKeyInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('mcSaveBtn').click();
    });
  }

  function renderChat() {
    const hasMsgs = messages.length > 0;
    body.style.display = 'flex';
    body.style.flexDirection = 'column';
    body.style.flex = '1';
    body.style.overflow = 'hidden';

    const suggestions = !hasMsgs ? [
      'What can I substitute for heavy cream?',
      'How do I know when pasta is al dente?',
      'Tips for better knife skills?',
    ] : [];

    body.innerHTML = `
      <div class="mc-messages" id="mcMsgs">
        ${!hasMsgs ? `<div class="mc-msg assistant">Hi! I'm here to help with cooking questions — substitutions, techniques, timing, anything recipe-related.</div>` : ''}
        ${messages.map(m => `<div class="mc-msg ${m.role}">${escHtml(m.content)}</div>`).join('')}
      </div>
      ${suggestions.length ? `<div class="mc-suggestions">${suggestions.map(s => `<button class="mc-chip" data-q="${escAttr(s)}">${escHtml(s)}</button>`).join('')}</div>` : ''}
      <div class="mc-input-bar">
        <textarea class="mc-textarea" id="mcInput" rows="1" placeholder="Ask anything about cooking…"></textarea>
        <button class="mc-send-btn" id="mcSend" ${isLoading ? 'disabled' : ''}>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M7 2l5 5-5 5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>`;

    const msgsEl = document.getElementById('mcMsgs');
    msgsEl.scrollTop = msgsEl.scrollHeight;

    // Auto-grow textarea
    const ta = document.getElementById('mcInput');
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 96) + 'px';
    });
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(ta.value.trim()); }
    });
    document.getElementById('mcSend').addEventListener('click', () => sendMessage(ta.value.trim()));

    body.querySelectorAll('.mc-chip').forEach(chip => {
      chip.addEventListener('click', () => sendMessage(chip.dataset.q));
    });
  }

  /* ── Send ───────────────────────────────── */
  async function sendMessage(text) {
    if (!text || isLoading) return;
    isLoading = true;
    messages.push({ role: 'user', content: text });
    renderChat();
    appendTyping();

    const key = localStorage.getItem(LS_KEY);
    const systemPrompt = buildSystem();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5',
          max_tokens: 512,
          system: systemPrompt,
          messages: messages.map(m => ({ role: m.role, content: m.content })),
        }),
      });

      const data = await res.json();

      if (!res.ok) {
        if (res.status === 401) {
          localStorage.removeItem(LS_KEY);
          messages.pop();
          isLoading = false;
          renderSetup();
          return;
        }
        throw new Error(data?.error?.message || `API error ${res.status}`);
      }

      const reply = data.content?.[0]?.text || '';
      messages.push({ role: 'assistant', content: reply });
    } catch (err) {
      messages.push({ role: 'error', content: `Error: ${err.message}` });
    }

    isLoading = false;
    renderChat();
  }

  function appendTyping() {
    const msgsEl = document.getElementById('mcMsgs');
    if (!msgsEl) return;
    const t = document.createElement('div');
    t.className = 'mc-typing'; t.id = 'mcTyping';
    t.innerHTML = '<span></span><span></span><span></span>';
    msgsEl.appendChild(t);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  /* ── System prompt ──────────────────────── */
  function buildSystem() {
    let ctx = 'You are a helpful, concise cooking assistant embedded in Mealtime — a personal recipe app. Keep answers brief and practical (2–4 sentences unless more detail is genuinely needed). Use plain text only, no markdown.';

    // Inject current recipe context if one is open
    if (typeof activeRecipe !== 'undefined' && activeRecipe) {
      ctx += `\n\nThe user currently has the recipe "${activeRecipe.name}" open.`;
      if (activeRecipe.ingredients?.length) {
        ctx += ` Ingredients: ${activeRecipe.ingredients.map(i => `${i.qty ? i.qty + ' ' : ''}${i.name}`).join(', ')}.`;
      }
      if (activeRecipe.directions?.length) {
        ctx += ` It has ${activeRecipe.directions.length} steps.`;
      }
    }

    // Shopping list context
    if (typeof SHOPPING !== 'undefined' && SHOPPING.length) {
      const pending = SHOPPING.filter(s => !s.checked).map(s => s.name);
      if (pending.length) ctx += `\n\nTheir current shopping list includes: ${pending.slice(0, 10).join(', ')}${pending.length > 10 ? '…' : ''}.`;
    }

    return ctx;
  }

  /* ── Helpers ────────────────────────────── */
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) {
    return s.replace(/"/g, '&quot;');
  }

  // Close panel on outside click
  document.addEventListener('click', e => {
    if (isOpen && !panel.contains(e.target) && e.target !== btn) {
      isOpen = false;
      btn.classList.remove('open');
      panel.classList.remove('open');
    }
  });
})();
</script>
